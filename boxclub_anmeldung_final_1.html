<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxclub Prüm e.V. - Anmeldung Probetraining</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .container {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.6);
            max-width: 560px;
            width: 100%;
            padding: 0;
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-section {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            padding: 80px 45px 55px;
            text-align: center;
            position: relative;
        }

        .logo-container {
            margin-bottom: 45px;
            animation: logoFade 0.8s ease-out;
        }

        @keyframes logoFade {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo-container img {
            max-width: 240px;
            width: 100%;
            height: auto;
            filter: drop-shadow(0 15px 35px rgba(164, 30, 52, 0.4));
        }

        .tagline-top {
            font-size: 11px;
            color: #A41E34;
            text-transform: uppercase;
            letter-spacing: 3.5px;
            margin-bottom: 14px;
            font-weight: 400;
        }

        .divider {
            width: 110px;
            height: 1.5px;
            background: linear-gradient(to right, #A41E34, #0D5C2C);
            margin: 24px auto 0;
            box-shadow: 0 2px 10px rgba(164, 30, 52, 0.25);
        }

        .description {
            font-size: 14px;
            color: #D5D5D5;
            line-height: 2;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-top: 12px;
        }

        .form-section {
            padding: 65px 45px;
            background: #ffffff;
        }

        .form-group {
            margin-bottom: 35px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select,
        textarea {
            width: 100%;
            padding: 15px 17px;
            border: 1px solid #e5e5e5;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Lato', sans-serif;
            color: #2d2d2d;
            background: #fafafa;
            transition: all 0.35s ease;
            letter-spacing: 0.3px;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="tel"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            background: #ffffff;
            border-color: #A41E34;
            box-shadow: 0 0 0 4px rgba(164, 30, 52, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 110px;
            font-family: 'Lato', sans-serif;
        }

        .required {
            color: #A41E34;
        }

        .button-container {
            margin-top: 50px;
        }

        button {
            width: 100%;
            padding: 17px 22px;
            background: linear-gradient(135deg, #A41E34 0%, #8B1E2E 100%);
            color: #ffffff;
            border: none;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            cursor: pointer;
            transition: all 0.35s ease;
            box-shadow: 0 12px 35px rgba(164, 30, 52, 0.35);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 45px rgba(164, 30, 52, 0.45);
        }

        button:active {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 35px;
            font-size: 11px;
            color: #999;
            text-align: center;
            line-height: 1.95;
            letter-spacing: 0.3px;
        }

        .success-message {
            display: none;
            background: linear-gradient(135deg, #A41E34 0%, #8B1E2E 100%);
            color: #ffffff;
            padding: 22px;
            border-radius: 5px;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            box-shadow: 0 12px 35px rgba(164, 30, 52, 0.35);
            animation: successPop 0.5s ease;
        }

        @keyframes successPop {
            0% {
                opacity: 0;
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
            }

            .header-section {
                padding: 55px 35px 45px;
            }

            .logo-container {
                margin-bottom: 35px;
            }

            .logo-container img {
                max-width: 200px;
            }

            .form-section {
                padding: 45px 35px;
            }

            .form-group {
                margin-bottom: 28px;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            button {
                padding: 16px 20px;
                font-size: 12px;
            }

            .description {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div class="logo-container">
                <img src="boxclub_logo.png" alt="Boxclub Prüm e.V.">
            </div>
            <div class="tagline-top">Gemeinsam Trainieren</div>
            <div class="divider"></div>
            <p class="description">Jeder ist willkommen.<br>Deine Reise beginnt jetzt.</p>
        </div>

        <div class="form-section">
            <div class="success-message" id="successMessage">
                ✓ Danke! Wir melden uns bald bei dir.
            </div>

            <form id="anmeldungsform" action="https://formspree.io/f/xpqglvwe" method="POST">
                <div class="form-row">
                    <div class="form-group">
                        <label for="vorname">Vorname <span class="required">*</span></label>
                        <input type="text" id="vorname" name="vorname" placeholder="Vorname" required>
                    </div>
                    <div class="form-group">
                        <label for="nachname">Nachname <span class="required">*</span></label>
                        <input type="text" id="nachname" name="nachname" placeholder="Nachname" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email-Adresse <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="deine@email.com" required>
                </div>

                <div class="form-group">
                    <label for="telefon">Telefonnummer <span class="required">*</span></label>
                    <input type="tel" id="telefon" name="telefon" placeholder="+49 ..." required>
                </div>

                <div class="form-group">
                    <label for="erfahrung">Boxen-Erfahrung <span class="required">*</span></label>
                    <select id="erfahrung" name="erfahrung" required>
                        <option value="">-- Bitte auswählen --</option>
                        <option value="Anfänger">Anfänger</option>
                        <option value="Mit Erfahrung">Mit Erfahrung</option>
                        <option value="Profi">Profi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="nachricht">Nachricht (optional)</label>
                    <textarea id="nachricht" name="nachricht" placeholder="Sag uns noch etwas über dich..."></textarea>
                </div>

                <div class="button-container">
                    <button type="submit">Anmeldung Abschicken</button>
                </div>

                <div class="footer-text">
                    Mit deiner Anmeldung stimmst du zu, dass wir deine Daten 
                    zum Kontakt wegen Probetraining speichern.
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('anmeldungsform');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', function(e) {
            // Formspree kümmert sich um die Speicherung
            // Diese Nachricht wird nach erfolgreicher Übermittlung angezeigt
            setTimeout(() => {
                successMessage.style.display = 'block';
                form.style.display = 'none';
                
                setTimeout(() => {
                    form.reset();
                    form.style.display = 'block';
                    successMessage.style.display = 'none';
                }, 3000);
            }, 500);
        });
    </script>
</body>
</html>
